# Serverless Devs Configuration for Alibaba Cloud Function Compute
# 
# Simplified workflow:
#   1. Edit code, add packages to requirements.txt
#   2. Run: s build --use-docker
#   3. Run: s deploy
# 
# Serverless Devs handles all dependency packaging automatically—no manual layer wrangling!
# 
# Documentation: https://www.serverless-devs.com/

edition: 3.0.0
name: corporate-intelligence-engine
access: alibaba

vars:
  region: us-east-1
  runtime: custom.debian11
  memory: 1024
  timeout: 300

resources:
  fastapi-backend:
    component: fc3
    props:
      region: ${vars.region}
      functionName: corporate-intelligence-fastapi
      description: Multi-agent investment analysis orchestrator with real-time market data
      runtime: ${vars.runtime}
      codeUri: .                    # Root directory with requirements.txt
      handler: backend.handler      # Entry point
      memorySize: ${vars.memory}
      timeout: ${vars.timeout}
      instanceConcurrency: 10
      cpuType: x86
      
      # Custom Runtime boot config
      # Port MUST be 9000 — this is where Alibaba FC health check probes
      customRuntimeConfig:
        caPort: 9000
        command:
          - bash
        args:
          - /code/bootstrap
      
      # Environment variables (non-sensitive configuration only)
      # Use Alibaba Cloud Console to add secrets after deployment:
      # DASHSCOPE_API_KEY, ALPHA_VANTAGE_API_KEY, PROD_SERVERLESS_DB_URL
      environmentVariables:
        # CRITICAL: Port must be 9000 for Alibaba Cloud FC health checks
        # The cloud load balancer probes port 9000; if unresponsive for 120s, instance is killed
        BACKEND_PORT: "9000"
        
        QWEN_MODEL: qwen3.7-plus
        QWEN_ROUTING_MODEL: qwen3.6-flash
        QWEN_TEMPERATURE: "0.3"
        QWEN_TOP_P: "0.65"
        ENVIRONMENT: production
        DEBUG: "false"
      
      # HTTP trigger for REST API
      triggers:
        - type: http
          name: api-http-trigger
          properties:
            qualifier: LATEST
            methods:
              - POST
              - GET
              - OPTIONS
            authType: anonymous
            enableCORS: true
      
      # Logging
      logConfig:
        logstore: corporate-intelligence-logs
        project: corporate-intelligence-project
